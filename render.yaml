services:
  - type: web
    name: reading-hub
    runtime: node
    plan: free
    buildCommand: rm -rf node_modules package-lock.json && npm install --legacy-peer-deps
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DELETE_PASSWORD
        sync: false
      - key: PORT
        value: 10000
